<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phoenix Printing Solutions - Pending Queue</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>

<script src="../assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>

<style>
:root { --pps-green:#066d44; }

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f2f3f5;
  color:#333;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 0;
}

/* background image + overlay REMOVED */

.container{
  width:90%;
  max-width:1200px;
  background:#ffffff;
  border:1px solid #e0e0e0;
  border-radius:12px;
  overflow:hidden;
}

.table-title{
  padding:25px 30px;
  font-family:'Syncopate';
  font-size:.9rem;
  letter-spacing:3px;
  background:var(--pps-green);
  color:#fff;
  display:flex;
  align-items:center;
}

.status-dot{
  width:8px;
  height:8px;
  background:#fff;
  border-radius:50%;
  display:inline-block;
  margin-right:10px;
}

table{width:100%;border-collapse:collapse;text-align:left}

thead{
  background:#fafafa;
  font-family:'Syncopate';
  font-size:.65rem;
  letter-spacing:2px;
  color:#888;
}

th{
  padding:20px 30px;
  font-weight:700;
  border-bottom:1px solid #e0e0e0;
}

td{
  padding:18px 30px;
  border-bottom:1px solid #eee;
  font-size:.85rem;
  cursor:pointer;
  transition:.2s;
  color:#333;
}

tr:hover td{background:#f9f9f9}

.ref-code{
  color:var(--pps-green);
  font-family:monospace;
  font-weight:700;
  letter-spacing:1px;
}

.mode-tag{
  font-size:.65rem;
  padding:4px 8px;
  border-radius:4px;
  text-transform:uppercase;
  font-weight:700;
  border:1px solid;
}

.mode-client{border-color:#00d4ff;color:#00d4ff}
.mode-entrepreneur{border-color:#ffcc00;color:#ffcc00}
</style>
</head>

<body>

<div class="container">
  <div class="table-title">
    <span class="status-dot"></span>PENDING REQUESTS
  </div>

  <table>
    <thead>
      <tr>
        <th>REF CODE</th>
        <th>CLIENT / BUSINESS NAME</th>
        <th>CITY</th>
        <th>WORKSPACES</th>
        <th>MODE</th>
        <th>TIME</th>
      </tr>
    </thead>
    <tbody id="queueBody"></tbody>
  </table>
</div>

<script>
(function(){
  window.moveToInProgress = async (id) => {
    try {
      await fetch("https://puymabrkwtpvhropcvqk.supabase.co/functions/v1/move-to-inprogress", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk"
        },
        body: JSON.stringify({ request_id: id })
      });
    } catch (err) {
      console.error("Error moving to in-progress:", err);
    }
  };

  function handleRequestClick(id, mode) {
    try {
      window.supabaseClient
        .from('pps_queue')
        .update({ status: 'in-progress' })
        .eq('request_id', id);
    } catch(e){}

    window.moveToInProgress(id);
    window.location.href = `admininvoice.html?request_id=${id}`;
  }

  async function fetchAndRender(){
    try{
      const { data, error } = await window.supabaseClient
        .from('pps_queue')
        .select('*')
        .or('status.eq.pending,status.is.null')
        .order('created_at', { ascending:false });

      if(error) return;

      render(data || []);
    }catch(err){console.error(err);}
  }

  function render(items){
    const tbody=document.getElementById("queueBody");
    tbody.innerHTML="";

    if(items.length===0){
      tbody.innerHTML="<tr><td colspan='6' style='text-align:center;padding:50px;opacity:.5'>No pending requests</td></tr>";
      return;
    }

    items.forEach(req=>{
      const tr=document.createElement("tr");
      const time=req.created_at
        ? new Date(req.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
        : "--:--";

      tr.onclick=()=>handleRequestClick(req.request_id, req.sourceMode);

      tr.innerHTML=`
        <td class="ref-code">#PPS-${req.request_id.slice(0,8).toUpperCase()}</td>
        <td><strong>${req.client?.name||'Unknown'}</strong></td>
        <td>${req.location?.city||'---'}</td>
        <td>${(req.workspaces||[]).length}</td>
        <td><span class="mode-tag ${req.sourceMode==='entrepreneur'?'mode-entrepreneur':'mode-client'}">${req.sourceMode}</span></td>
        <td>${time}</td>`;
      tbody.appendChild(tr);
    });
  }

  function subscribeToChanges(){
    window.supabaseClient
      .channel("pps_queue_changes")
      .on("postgres_changes",{event:"*",table:"pps_queue"},fetchAndRender)
      .subscribe();
  }

  document.addEventListener("DOMContentLoaded",()=>{
    fetchAndRender();
    subscribeToChanges();
  });
})();
</script>

</body>
</html>
