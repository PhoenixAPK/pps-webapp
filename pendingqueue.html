<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Phoenix Printing Solutions | Redefine Your Space</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@300;500;800&amp;family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<script src="../assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background: #f2f3f5 !important; /* original background removed */#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding-top:140px;padding-bottom:68px}
    body::before_removed{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background: #f2f3f5 !important; /* original background removed */rgba(0,0,0,0.5);z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00,0 0 30px #ff4d00,0 0 40px #ff0000;animation:flicker 1.5s infinite alternate}
    @keyframes flicker{0%{opacity:1;text-shadow:0 0 10px var(--fire-orange),0 0 20px var(--fire-yellow)}100%{opacity:.9;text-shadow:0 0 15px var(--fire-orange),0 0 30px var(--fire-orange),0 0 40px #ff0000}}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background: #f2f3f5 !important; /* original background removed */rgba(0,255,135,0.1)}
    .container{width:90%;max-width:1200px;background: #f2f3f5 !important; /* original background removed */#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;color:#333}
    .table-title{padding:25px 30px;font-family:'Syncopate';font-size:.9rem;letter-spacing:3px;background: #f2f3f5 !important; /* original background removed */#066d44;color:#fff;display:flex;align-items:center;justify-content:space-between}
    .status-dot{width:8px;height:8px;background: #f2f3f5 !important; /* original background removed */#fff;border-radius:50%;display:inline-block;margin-right:10px}
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background: #f2f3f5 !important; /* original background removed */#fafafa;font-family:'Syncopate';font-size:.65rem;letter-spacing:2px;color:#888}
    th{padding:20px 30px;font-weight:700;border-bottom:1px solid #e0e0e0}
    td{padding:18px 30px;border-bottom:1px solid #eee;font-size:.85rem;cursor:pointer;transition:.2s;color:#333}
    tr:hover td{background: #f2f3f5 !important; /* original background removed */#f9f9f9}
    .ref-code{color:#066d44;font-family:monospace;font-weight:700;letter-spacing:1px}
    .mode-tag{font-size:.65rem;padding:4px 8px;border-radius:4px;text-transform:uppercase;font-weight:700;border:1px solid}
    .mode-client{border-color:#00d4ff;color:#00d4ff}
    .mode-entrepreneur{border-color:#ffcc00;color:#ffcc00}
    footer{position:fixed;left:0;right:0;bottom:0;height:68px;background: #f2f3f5 !important; /* original background removed */rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;border-top:1px solid var(--glass-border)}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate',sans-serif;font-size:.62rem;letter-spacing:3px;color:#fff;opacity:.7;margin:0}
  </style>
</head>
<body>

<div class="container">
<div class="table-title"><span><span class="status-dot"></span>PENDING REQUESTS</span></div>
<table>
<thead>
<tr>
<th>REF CODE</th>
<th>CLIENT / BUSINESS NAME</th>
<th>CITY</th>
<th>WORKSPACES</th>
<th>MODE</th>
<th>TIME</th>
</tr>
</thead>
<tbody id="queueBody"></tbody>
</table>
</div>

<script>
  (function(){
    window.moveToInProgress = async (id) => {
      try {
        await fetch("https://puymabrkwtpvhropcvqk.supabase.co/functions/v1/move-to-inprogress", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eW1hYnJrd3Rwdmhyb3BjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTEyOTUsImV4cCI6MjA4ODg2NzI5NX0.kg7WvMRblzVf2iaQbt4Zz7DuNDgHGn9AKFHM_maGiTk"
          },
          body: JSON.stringify({ request_id: id })
        });
      } catch (err) {
        console.error("Error moving to in-progress:", err);
      }
    };

    function handleRequestClick(id, mode) {
      const target = `admininvoice.html?request_id=${id}`;
      try {
        window.supabaseClient
          .from('pps_queue')
          .update({ status: 'in-progress' })
          .eq('request_id', id)
          .then(({ error }) => { if (error) console.error('Status update failed:', error); })
          .catch(err => console.error('Update error:', err));
      } catch (e) { console.error(e); }
      window.location.href = target;
    }

    async function fetchAndRender(){
      try {
        const { data: items, error } = await window.supabaseClient
          .from('pps_queue')
          .select('*')
          .or('status.eq.pending,status.is.null')
          .order('created_at', { ascending: false });
        if (error) throw error;
        render(items || []);
      } catch (err) { console.error('Error fetching queue:', err); }
    }

    function render(items){
      const tbody = document.getElementById('queueBody');
      tbody.innerHTML = '';
      if(items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:50px; opacity:0.5;">No pending requests found.</td></tr>';
        return;
      }
      items.forEach(req => {
        const tr = document.createElement('tr');
        const mode = req.sourceMode;
        tr.onclick = () => {
          handleRequestClick(req.request_id, mode);
          window.moveToInProgress(req.request_id);
        };
        const time = req.created_at
          ? new Date(req.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
          : '--:--';
        const modeClass = mode === 'entrepreneur' ? 'mode-entrepreneur' : 'mode-client';
        tr.innerHTML = `
          <td class="ref-code">#PPS-${req.request_id.slice(0,8).toUpperCase()}</td>
          <td><strong>${req.client?.name || 'Unknown'}</strong></td>
          <td>${req.location?.city || '---'}</td>
          <td>${(req.workspaces || []).length}</td>
          <td><span class="mode-tag ${modeClass}">${mode}</span></td>
          <td>${time}</td>`;
        tbody.appendChild(tr);
      });
    }

    function subscribeToChanges() {
      window.supabaseClient
        .channel('pps_queue_changes')
        .on('postgres_changes', { event: '*', table: 'pps_queue' }, () => fetchAndRender())
        .subscribe();
    }

    document.addEventListener('DOMContentLoaded', () => { 
      fetchAndRender(); 
      subscribeToChanges(); 
    });
  })();
  </script>
</body>
</html>
