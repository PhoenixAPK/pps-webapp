function getCityData(city) { return cityData.find(item => item.city === city); }
function getDistance(city) { const data = getCityData(city); return data ? data.distance_km : 0; }
function getChargeableDistance(oneWayDistance) { return (oneWayDistance >= 51) ? oneWayDistance * 2 : oneWayDistance; }
function getMandatory(distance) {
  if (isEntrepreneur) { if (distance <= 50) return 6; if (distance <= 199) return 14; if (distance <= 299) return 20; if (distance <= 400) return 30; if (distance <= 499) return 35; return 40; }
  else { if (distance <= 50) return 4; if (distance <= 199) return 10; if (distance <= 299) return 15; if (distance <= 400) return 25; if (distance <= 499) return 30; return 35; }
}
function updateTotalPictureCount() {
  const city = document.getElementById("clientCity").value;
  if (!city) { document.getElementById("mandatoryPicturesOutput").value = "0"; return; }
  const oneWayDistance = getDistance(city);
  const baseMandatory = getMandatory(oneWayDistance);
  const optionalCount = document.querySelectorAll('.picture-row button').length;
  const total = baseMandatory + optionalCount;
  document.getElementById("mandatoryPicturesOutput").value = total;
}
function updateProjectDuration() {
  const rows = document.querySelectorAll(".picture-row");
  let totalArea = 0;
  rows.forEach(row => {
    const h = parseFloat(row.querySelector(".height").value) || 0;
    const w = parseFloat(row.querySelector(".width").value) || 0;
    totalArea += h * w;
  });
  const printSpeed = 1; const dailyHours = 8; const totalHours = totalArea / printSpeed;
  const totalDays = Math.floor(totalHours / dailyHours); const remainingHours = (totalHours % dailyHours).toFixed(1);
  document.getElementById("projectDurationOutput").value = totalDays > 0 ? `${totalDays} Day(s), ${remainingHours} Hour(s)` : `${totalHours.toFixed(1)} Hour(s)`;
}
function setModeLabel(mode) { document.getElementById("modeLabel").innerText = mode; }

function returnToMode() { document.getElementById("calculatorPage").style.display = "none"; document.getElementById("modePage").style.display = "flex"; }
function populateCitySelect() { 
  const clientCityEl = document.getElementById("clientCity"); 
  clientCityEl.innerHTML = '<option value="">Select City</option>'; 
  cityData.sort((a, b) => a.city.localeCompare(b.city)).forEach(item => { 
    const option = document.createElement("option"); 
    option.value = item.city; 
    option.text = item.city; 
    clientCityEl.appendChild(option); 
  }); 
  clientCityEl.onchange = handleCity;
}
function addPictureRow(isMandatory, targetColumn = null) {
  pictureCount++;
  const div = document.createElement("div"); div.classList.add("picture-row"); div.id = `pictureRow${pictureCount}`;
  const btn = isMandatory ? "" : `<button onclick=\"removePictureRow('${div.id}')\">❌</button>`;
  div.innerHTML = `<input type=\"number\" step=\"0.01\" class=\"height workspace-cell\" oninput=\"calculateAreas()\"><input type=\"number\" step=\"0.01\" class=\"width workspace-cell\" oninput=\"calculateAreas()\"><span class=\"actualArea workspace-cell\">0.00</span><span class=\"chargeableArea workspace-cell\">0.00</span>${btn}`;
  if (targetColumn) targetColumn.appendChild(div);
  else {
    const L = document.getElementById("leftPictureContainer").children.length; const R = document.getElementById("rightPictureContainer").children.length;
    (L <= R ? document.getElementById("leftPictureContainer") : document.getElementById("rightPictureContainer")).appendChild(div);
  }
  updateTotalPictureCount();
}
function removePictureRow(id) { document.getElementById(id).remove(); updateTotalPictureCount(); calculateAreas(); }
function handleCity() {
  const city = document.getElementById("clientCity").value;
  document.getElementById("leftPictureContainer").innerHTML = ""; 
  document.getElementById("rightPictureContainer").innerHTML = "";
  
  if (!city) {
    document.getElementById("distanceInput").value = "0 km";
    document.getElementById("clientRegion").value = "";
    document.getElementById("mandatoryPicturesOutput").value = "0";
    return;
  }

  const cityInfo = getCityData(city); 
  const oneWayDistance = getDistance(city);
  document.getElementById("distanceInput").value = oneWayDistance.toFixed(0) + ' km';
  document.getElementById("clientRegion").value = cityInfo ? cityInfo.region : "";
  
  const mandatoryCount = getMandatory(oneWayDistance); 
  const leftCount = Math.ceil(mandatoryCount / 2);
  for (let i = 0; i < leftCount; i++) addPictureRow(true, document.getElementById("leftPictureContainer"));
  for (let i = 0; i < (mandatoryCount - leftCount); i++) addPictureRow(true, document.getElementById("rightPictureContainer"));
  updateTotalPictureCount();
}

function calculateAreas() {
  let totalChargeable = 0;
  document.querySelectorAll(".picture-row").forEach(row => {
    const h = parseFloat(row.querySelector(".height").value) || 0; const w = parseFloat(row.querySelector(".width").value) || 0;
    const actual = h * w; row.querySelector(".actualArea").innerText = actual.toFixed(2);
    let charge = 0; if (actual > 0) { if (actual <= 1) charge = 1; else if (actual <= 1.49) charge = 1.5; else if (actual <= 1.99) charge = 2; else charge = Math.ceil(actual * 2) / 2; }
    row.querySelector(".chargeableArea").innerText = charge.toFixed(2);
    totalChargeable += charge;
  });
  updateProjectDuration();
  return totalChargeable;
}
function generateInvoice() {

  const basePrice = isEntrepreneur ? 200 : 250; 
  const baseCost = total * basePrice; 
  const city = document.getElementById("clientCity").value;

         <div class="invoice-client-line" style="font-weight: bold; color: #046C4E;"><div class="invoice-client-label">Pictures:</div><div class="invoice-client-value">${document.getElementById("mandatoryPicturesOutput").value}</div></div> 
         <div class="invoice-client-line" style="font-weight: bold; color: #046C4E;"><div class="invoice-client-label">Duration:</div><div class="invoice-client-value">${document.getElementById("projectDurationOutput").value}</div></div>

async function downloadInvoice() {
  const element = document.querySelector('.invoice-container');
  if (!element) { alert('Please generate the invoice first.'); return; }
  try {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: '#ffffff', logging: false });
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const imgHeight = (canvas.height * pdfWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, imgHeight, undefined, 'FAST');
    pdf.save(`PPS-Invoice-${document.getElementById('clientName').value || 'Customer'}.pdf`);
  } catch (error) { console.error('PDF Error:', error); }
}
</script>
<script>
(function() {
  async function getRequestFromSupabase(id) {
    const { data, error } = await window.supabaseClient.from("pps_queue").select("*").eq("request_id", id).single();
    return error ? null : data;
  }
  function getParam(name) { return new URL(window.location.href).searchParams.get(name); }
  async function prefill() {
    const id = getParam("request_id");
    if (!id) return;
    const req = await getRequestFromSupabase(id);
    if (!req) return;
    const mode = (req.sourceMode || "client").toLowerCase();
    mode === "entrepreneur" ? startEntrepreneurMode() : startClientMode();
    document.getElementById("clientName").value = req.client?.name || "";
    document.getElementById("clientContact").value = req.client?.contact || "";
    document.getElementById("clientEmail").value = req.client?.email || "";
    document.getElementById("clientAddress").value = req.client?.address || "";
    const citySel = document.getElementById("clientCity");
    if (citySel) { citySel.value = req.location?.city || ""; handleCity(); }
    const need = (req.workspaces || []).length;
    const have = document.querySelectorAll(".picture-row").length;
    for (let i = have; i < need; i++) addPictureRow(false);
    const rows = Array.from(document.querySelectorAll(".picture-row"));
    (req.workspaces || []).forEach((w, idx) => {
      const r = rows[idx];
      if (!r) return;
      r.querySelector(".height").value = w.height || 0;
      r.querySelector(".width").value = w.width || 0;
    });
    calculateAreas();
  }
  document.addEventListener("DOMContentLoaded", prefill);
})();
</script>
</body>
</html>
