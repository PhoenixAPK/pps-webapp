/* --- COMPACT STYLING --- */ 
body { 
 font-family: Roboto,sans-serif; 
 background: transparent; 
 margin: 0; 
 padding: 0; 
 font-size: 14px; 
 min-height: 100vh; 
 display: flex; 
 align-items: center; 
 justify-content: center; 
} 
/* --- WELCOMING PAGE STYLING --- */ 
.mode-selection-vertical { 
 display: flex; 
 flex-direction: column; 
 align-items: center; 
 justify-content: center; 
 gap: 60px; 
 width: 100%; 
 height: 100vh; 
 position: relative; 
} 
.buttons-container { 
 display: flex; 
 justify-content: center; 
 align-items: center; 
 gap: 100px; 
 width: 100%; 
 max-width: 800px; 
}

 width: 200px; 
 height: 80px; 
 background: #d1d5db; 
 color: #111827; 
 border: none; 
 border-radius: 15px; 
 font-size: 18px; 
 font-weight: 600; 
 cursor: pointer; 
 transition: all 0.3s ease; 
 display: flex; 
 align-items: center; 
 justify-content: center; 
} 
.mode-button:hover { 
 background-color: #c5c9d0;
 transform: translateY(-5px) scale(1.05); 
} 
.mode-button:active { 
 transform: translateY(-2px) scale(1.02); 
} 
/* --- INVISIBLE MAIN CONTAINER --- */ 
.container { 
 max-width: 960px; 
 margin: 15px auto; 
 padding: 20px; 
 background: rgba(245, 245, 245, 0.85); 
 border-radius: 12px; 
 box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
 position: relative; 
 backdrop-filter: blur(5px); 
} 
.centered-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; } 
.centered-header img { max-height: 60px; margin-bottom: 10px; }

.client-info, .costs { 
 display: grid; 
 grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
 gap: 15px; 
 margin-bottom: 20px; 
 padding: 12px; 
 background: rgba(255, 255, 255, 0.7); 
 border-radius: 8px; 
 align-items: end; 
 backdrop-filter: blur(3px); 
} 
.client-info label, .picture-row label { 
 display: block; 
 margin-bottom: 4px; 
 font-weight: 500; 
 color: #333; 
 font-size: 13px; 
 text-shadow: 1px 1px 2px rgba(255,255,255,0.8); 
} 
.client-info input, .client-info select, .costs input, .costs select { 
 width: 100%; 
 padding: 8px; 
 border: 1px solid rgba(204, 204, 204, 0.8); 
 border-radius: 6px; 
 box-sizing: border-box; 
 font-size: 14px; 
 background-color: rgba(255, 255, 255, 0.9); 
}

 border-color: #046C4E; 
 outline: none; 
 box-shadow: 0 0 5px rgba(4,108,78,0.3);

.narrow-input { 
 width: 100px !important;

.pictures { 
 margin-bottom: 20px; 
 background: rgba(255, 255, 255, 0.7); 
 padding: 15px; 
 border-radius: 8px;

.pictures h2 {

 margin-bottom: 10px; 
 color: #046C4E; 
 text-shadow: 1px 1px 2px rgba(255,255,255,0.8);

.workspace-frame { 
 background: transparent; 
 border: none; 
 border-radius: 0; 
 padding: 0; 
 margin-bottom: 10px; 
} 
.workspace-container { 
 display: flex; 
 gap: 0px; 
 margin-bottom: 20px; 
} 
.workspace-column {

 display: flex; 
 flex-direction: column; 
 gap: 15px; 
}

 margin-bottom: 8px;

 color: #333; 
 font-size: 13px; 
 background: rgba(255, 255, 255, 0.5); 
 padding: 5px; 
 border-radius: 6px;

.workspace-frame .grid-header span { 
 padding: 0 5px;

.workspace-cell {

 text-align: center;

} 
.picture-row input.workspace-cell {

 border-radius: 4px;

 color: #046C4E; 
 padding: 6px 5px; 
 background: rgba(224, 242, 241, 0.8); 
 border-radius: 4px; 
 font-size: 13px;

.picture-row {

 gap: 6px; 
 margin-bottom: 6px; 
 align-items: center; 
 background-color: rgba(249, 249, 249, 0.7); 
 padding: 8px; 
 border-radius: 8px; 
 backdrop-filter: blur(2px);

.invoice-header { text-align: center; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; }

.invoice-title { text-align: center; font-weight: 700; font-size: 18px; margin: 20px 0 8px; text-transform: uppercase; color: #046C4E; } 
.invoice-client-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }

.invoice-client-value { text-align: left; flex: 1; font-size: 13px; } 
.invoice-table-container { overflow-x: auto; margin-bottom: 20px; } 
.invoice-table { width: 100%; border-collapse: collapse; }

.invoice-table th { background: #046C4E; color: #fff; font-weight: 700; }

.invoice-additional-costs { width: 50%; margin-left: auto; font-size: 13px; margin-bottom: 20px; }

 document.getElementById("leftPictureContainer").appendChild(div); 
 } else { 
 document.getElementById("rightPictureContainer").appendChild(div); 
 } 
 } 
 if (!isMandatory) { updateTotalPictureCount(); } 
} 
function removePictureRow(id) { 
 document.getElementById(id).remove(); 
 updateTotalPictureCount(); 
 calculateAreas(); 
} 
function handleCity() { 
 const city = document.getElementById("clientCity").value; 
 document.getElementById("leftPictureContainer").innerHTML = ""; 
 document.getElementById("rightPictureContainer").innerHTML = ""; 
 pictureCount = 0; 
 const cityInfo = getCityData(city); 
 const oneWayDistance = city ? getDistance(city) : 0; 
 document.getElementById("distanceInput").value = oneWayDistance.toFixed(0) + ' km'; 
 if (cityInfo) { 
 document.getElementById("clientRegion").value = cityInfo.region; 
 } else { 
 document.getElementById("clientRegion").value = ""; 
 } 
 if (city) { 
 const mandatoryCount = getMandatory(oneWayDistance); 
 const leftCount = Math.ceil(mandatoryCount / 2); 
 const rightCount = mandatoryCount - leftCount; 
 for (let i = 0; i < leftCount; i++) { 
 addPictureRow(true, document.getElementById("leftPictureContainer")); 
 } 
 for (let i = 0; i < rightCount; i++) { 
 addPictureRow(true, document.getElementById("rightPictureContainer")); 
 } 
 updateTotalPictureCount(); 
 } 
 else { 
 document.getElementById("mandatoryPicturesOutput").value = "0";
 document.getElementById("invoiceDisplay").innerHTML = ""; 
 } 
} 
document.getElementById("clientCity").addEventListener("change", handleCity); 
function resetCalculator() { 
 ["clientCity", "clientName", "clientContact", "clientEmail", "clientAddress", "fuelPrice", "tollPrice", "accommodationPrice", "clientRegion"].forEach(id => (document.getElementById(id).value = "")); 
 document.getElementById("distanceInput").value = "0"; 
 document.getElementById("mandatoryPicturesOutput").value = "0"; 
 document.getElementById("projectDurationOutput").value = ""; 
 document.getElementById("leftPictureContainer").innerHTML = ""; 
 document.getElementById("rightPictureContainer").innerHTML = ""; 
 pictureCount = 0; 
 document.getElementById("invoiceDisplay").innerHTML = ""; 
} 
function calculateAreas() { 
 return Array.from(document.querySelectorAll(".picture-row")).reduce((sum, row) => { 
 const h = parseFloat(row.querySelector(".height").value) || 0; 
 const w = parseFloat(row.querySelector(".width").value) || 0; 
 const actual = h * w; 
 row.querySelector(".actualArea").innerText = actual.toFixed(2); 
 let chargeable = 0; 
 if (actual <= 1) chargeable = 1; 
 else if (actual <= 1.49) chargeable = 1.5; 
 else if (actual <= 1.99) chargeable = 2; 
 else chargeable = Math.ceil(actual * 2) / 2; 
 row.querySelector(".chargeableArea").innerText = chargeable.toFixed(2); 
 return sum + chargeable; 
 }, 0); 
} 
function generateInvoice() { 
 const total = calculateAreas(); 
 const basePrice = isBusiness ? 200 : 250; 
 const baseCost = total * basePrice; 
 const city = document.getElementById("clientCity").value; 
 const oneWayDistance = city ? getDistance(city) : 0; 
 const totalChargeableDistance = getChargeableDistance(oneWayDistance); 
 const fuelPrice = parseFloat(document.getElementById("fuelPrice").value) || 0; 
 const toll = parseFloat(document.getElementById("tollPrice").value) || 0; 
 const accom = parseFloat(document.getElementById("accommodationPrice").value) || 0; 
 const fuelLiters = totalChargeableDistance * (5 / 100); 
 const fuelCost = fuelLiters * fuelPrice; 
 const travelLogisticsTotal = fuelCost + toll + accom; 
 const grandTotal = baseCost + travelLogisticsTotal; 
 updateProjectDuration(); 
 document.getElementById("invoiceDisplay").innerHTML = `<div class="invoice-container"><div class="invoice-header"><h1>Phoenix Printing Solutions</h1></div><div class="invoice-title">Invoice for: ${document.getElementById("clientName").value}</div><div class="invoice-client-info"><div class="invoice-client-line"><div class="invoice-client-label">Name:</div><div class="invoice-client-value">${document.getElementById("clientName").value}</div></div><div class="invoice-client-line"><div class="invoice-client-label">Contact:</div><div class="invoice-client-value">${document.getElementById("clientContact").value}</div></div><div class="invoice-client-line"><div class="invoice-client-label">Email:</div><div class="invoice-client-value">${document.getElementById("clientEmail").value}</div></div><div class="invoice-client-line"><div class="invoice-client-label">Address:</div><div class="invoice-client-value">${document.getElementById("clientAddress").value}</div></div><div class="invoice-client-line"><div class="invoice-client-label">City:</div><div class="invoice-client-value">${city}</div></div><div class="invoice-client-line"><div class="invoice-client-label">Region:</div><div class="invoice-client-value">${document.getElementById("clientRegion").value}</div></div><div class="invoice-client-line" style="font-weight: bold; color: #046C4E;"><div class="invoice-client-label">Distance:</div><div class="invoice-client-value">${totalChargeableDistance.toFixed(0)} km</div></div><div class="invoice-client-line" style="font-weight: bold; color: #046C4E;"><div class="invoice-client-label">Pictures:</div><div class="invoice-client-value">${document.getElementById("mandatoryPicturesOutput").value}</div></div><div class="invoice-client-line" style="font-weight: bold; color: #046C4E;"><div class="invoice-client-label">Duration:</div><div class="invoice-client-value">${document.getElementById("projectDurationOutput").value}</div></div></div><div class="invoice-table-container"><table class="invoice-table"><tr><th>Item</th><th>H×W</th><th>Actual</th><th>Chargeable</th><th>Unit Price</th><th>Cost</th></tr>${Array.from(document.querySelectorAll(".picture-row")).map((row, i) => { const h = parseFloat(row.querySelector(".height").value) || 0, w = parseFloat(row.querySelector(".width").value) || 0, actual = parseFloat(row.querySelector(".actualArea").innerText), charge = parseFloat(row.querySelector(".chargeableArea").innerText), cost = charge * basePrice; return `<tr><td>Workspace ${i + 1}</td><td>${h.toFixed(2)}×${w.toFixed(2)}</td><td>${actual.toFixed(2)}</td><td>${charge.toFixed(2)}</td><td>${basePrice.toFixed(2)}</td><td>${cost.toFixed(2)}</td></tr>`; }).join("")}<tr class="total"><td colspan="3">Total Chargeable Area</td><td>${total.toFixed(2)}</td><td></td><td>${baseCost.toFixed(2)}</td></tr></table></div><div class="invoice-additional-costs"><table><tr class="pdf-individual-cost"><td>Fuel Cost (${totalChargeableDistance.toFixed(0)} km)</td><td class="value">${fuelCost.toFixed(2)}</td></tr><tr class="pdf-individual-cost"><td>Toll (DH)</td><td class="value">${toll.toFixed(2)}</td></tr><tr class="pdf-individual-cost"><td>Accommodation (DH)</td><td class="value">${accom.toFixed(2)}</td></tr><tr><td>**Travel & Logistics Total**</td><td class="value">${travelLogisticsTotal.toFixed(2)}</td></tr></table></div><div class="invoice-grand-total">Grand Total: ${grandTotal.toFixed(2)}</div><div class="invoice-footer"><div>Business Name: Phoenix Printing Solutions</div><div>Contact: 0667336303</div><div>Email: imamhicham@outlook.com</div><div>Address: 102 Hay Chemaou, Sale</div></div></div>`; 
 setTimeout(() => { 
 document.getElementById('invoiceDisplay').scrollIntoView({ behavior: 'smooth', block: 'start' }); 
 }, 100); 
} 
async function downloadInvoice() { 
 const invoiceContainer = document.getElementById("invoiceDisplay").querySelector(".invoice-container"); 
 if (!invoiceContainer) { alert("Please generate the invoice first."); return; } 
 const downloadBtn = document.querySelector('.btn-download'); const originalText = downloadBtn.innerHTML; downloadBtn.innerHTML = '⏳ Generating...'; downloadBtn.disabled = true; 
 try { 
 const canvas = await html2canvas(invoiceContainer, { 
 scale: 2, 
 useCORS: true, 
 backgroundColor: '#fff', 
 logging: false, 
 onclone: (clonedDoc) => { 
 const clonedLogo = clonedDoc.querySelector('.invoice-container img'); 
 if (clonedLogo) { 
 clonedLogo.src = LOGO_BASE64; 
 } 
 const individualCosts = clonedDoc.querySelectorAll(".pdf-individual-cost"); 
 individualCosts.forEach(row => row.style.display = 'none'); 
 const footer = clonedDoc.querySelector(".invoice-footer"); 
 if (footer) footer.style.display = "flex"; 
 } 
 }); 
 const { jsPDF } = window.jspdf; const pdf = new jsPDF("p", "mm", "a4"); const imgData = canvas.toDataURL('image/png'); const imgWidth = 208; const pageHeight = 295; const imgHeight = (canvas.height * imgWidth) / canvas.width; let heightLeft = imgHeight; let position = 0; pdf.addImage(imgData, 'PNG', 1, position, imgWidth, imgHeight); heightLeft -= pageHeight; while (heightLeft > 0) { position = -heightLeft; pdf.addPage(); pdf.addImage(imgData, 'PNG', 1, position, imgWidth, imgHeight); heightLeft -= pageHeight; } pdf.save("Invoice.pdf"); 
 } catch (error) { console.error("Error generating PDF:", error); alert("An error occurred. Check the F12 console for details."); } finally { downloadBtn.innerHTML = originalText; downloadBtn.disabled = false; } 
} 
</script> 

<script>
(function(){
  function loadQueue(){ try{ return JSON.parse(localStorage.getItem('pps_queue'))||[] }catch(e){ return [] } }
  function getParam(name){ try{ var u=new URL(window.location.href); return u.searchParams.get(name); }catch(e){ return null } }
  function prefill(){
    var id = getParam('request_id'); var mode=(getParam('mode')||'client').toLowerCase(); if(!id) return;
    if(typeof startBusinessMode==='function' && typeof startClientMode==='function'){
      if(mode==='entrepreneur') startBusinessMode(); else startClientMode();
    }
    var req = (loadQueue()||[]).find(function(r){ return r.request_id===id; }); if(!req) return;
    var map = {
      clientName: req.client && req.client.name || '',
      clientContact: req.client && req.client.contact || '',
      clientEmail: req.client && req.client.email || '',
      clientAddress: req.client && req.client.address || ''
    };
    Object.keys(map).forEach(function(k){ var el=document.getElementById(k); if(el) el.value=map[k]; });
    var citySel=document.getElementById('clientCity'); if(citySel){ citySel.value = (req.location && req.location.city)||''; if(typeof handleCity==='function') handleCity(); }
    var need=(req.workspaces||[]).length; var have=document.querySelectorAll('.picture-row').length;
    for(var i=have;i<need;i++){ if(typeof addPictureRow==='function') addPictureRow(false); }
    var rows=Array.from(document.querySelectorAll('.picture-row'));
    (req.workspaces||[]).forEach(function(w,idx){ var r=rows[idx]; if(!r) return; var h=r.querySelector('.height'); var wd=r.querySelector('.width'); if(h) h.value=w.height||0; if(wd) wd.value=w.width||0; });
    if(typeof calculateAreas==='function') calculateAreas();
    if(typeof updateProjectDuration==='function') updateProjectDuration();
    var pics=document.getElementById('mandatoryPicturesOutput'); if(pics) pics.value=need;
  }
  document.addEventListener('DOMContentLoaded', prefill);
})();
</script>
